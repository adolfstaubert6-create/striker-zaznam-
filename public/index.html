<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STRIKER – Denný Záznam</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
    :root{--bg:#0a0a0a;--surface:#111111;--border:#222222;--accent:#e8ff00;--accent2:#ff4500;--text:#f0f0f0;--muted:#666666;--danger:#ff4500}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;padding:24px 16px}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .logo{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:22px;color:var(--accent);letter-spacing:-1px}
    .logo span{color:var(--muted);font-weight:400}
    .tabs{display:flex;gap:8px;margin-bottom:24px}
    .tab{padding:10px 20px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px;background:transparent;color:var(--muted);transition:all 0.2s}
    .tab.active{background:var(--accent);color:#000;border-color:var(--accent)}
    h2{font-size:13px;font-weight:400;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
    textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:15px;line-height:1.6;padding:16px;border-radius:6px;resize:vertical;min-height:160px;outline:none;transition:border-color 0.2s}
    textarea:focus{border-color:var(--accent)}
    textarea::placeholder{color:var(--muted)}
    .btn-primary{margin-top:16px;width:100%;background:var(--accent);color:#000;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px;letter-spacing:1px;border:none;padding:16px;border-radius:6px;cursor:pointer;text-transform:uppercase}
    .btn-primary:disabled{opacity:0.4;cursor:not-allowed}
    #status{margin-top:12px;font-size:13px;font-family:'IBM Plex Mono',monospace;color:var(--muted);min-height:20px}
    #status.error{color:var(--accent2)}
    #status.ok{color:var(--accent)}
    #result{margin-top:24px;display:none}
    .result-grid{display:flex;flex-direction:column;gap:12px}
    .field{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px}
    .field-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
    .field-value{font-size:14px;line-height:1.6;color:var(--text)}
    .field-value.empty{color:var(--muted);font-style:italic}
    .tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
    .tag{background:#1a1a1a;border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:13px;font-family:'IBM Plex Mono',monospace}
    #historyPanel{display:none}
    .history-toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .btn-sm{padding:8px 14px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all 0.2s}
    .btn-sm:hover{border-color:var(--accent)}
    .btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
    .btn-danger:disabled{opacity:0.3;cursor:not-allowed}
    .selected-count{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);margin-left:auto}
    .zaznam-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;transition:border-color 0.2s;cursor:pointer;user-select:none}
    .zaznam-item.selected{border-color:var(--accent)}
    .zaznam-check{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
    .zaznam-item.selected .zaznam-check{background:var(--accent);border-color:var(--accent)}
    .zaznam-check::after{content:'✓';font-size:11px;color:#000;display:none}
    .zaznam-item.selected .zaznam-check::after{display:block}
    .zaznam-body{flex:1}
    .zaznam-date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);margin-bottom:4px}
    .zaznam-title{font-size:14px;color:var(--text);margin-bottom:4px}
    .zaznam-sub{font-size:12px;color:var(--muted)}
    .zaznam-delete{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;border-radius:4px;transition:color 0.2s;flex-shrink:0}
    .zaznam-delete:hover{color:var(--danger)}
    .no-records{text-align:center;padding:40px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--accent);color:var(--text);padding:12px 20px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;display:flex;gap:12px;align-items:center;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
    .toast.show{opacity:1;pointer-events:auto}
    .toast-undo{background:none;border:none;color:var(--accent);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px;text-decoration:underline}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.show{display:flex}
    .modal{background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:24px;max-width:400px;width:100%}
    .modal h3{font-family:'IBM Plex Mono',monospace;font-size:16px;margin-bottom:12px}
    .modal p{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5}
    .modal-btns{display:flex;gap:8px;justify-content:flex-end}
    .btn-cancel{padding:10px 20px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px}
    .btn-confirm-delete{padding:10px 20px;border:none;border-radius:6px;background:var(--danger);color:#fff;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px}
  </style>
</head>
<body>
<header><div class="logo">STRIKER<span>/zaznam</span></div></header>
<div class="tabs">
  <button class="tab active" onclick
